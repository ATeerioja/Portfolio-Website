name: Build & Deploy to Fly.io

on:
  push:
    branches:
      - main
  pull_request:

permissions: 
  contents: read 
  id-token: write 
  issues: write 
  pull-requests: write

jobs:
  TruffleHog: 
      runs-on: ubuntu-latest 
      defaults: 
        run: 
          shell: bash 
      steps: 
        - name: Checkout code 
          uses: actions/checkout@v6
          with: 
            fetch-depth: 0

        - name: TruffleHog OSS 
          id: trufflehog 
          uses: trufflesecurity/trufflehog@add-actions-cli-switch 
          continue-on-error: true 
          with: 
            path: ./ 
            base: "${{ github.event.repository.default_branch }}" 
            head: HEAD 
            extra_args: --debug --only-verified ﻿
        
        - name: Scan Results Status 
          if: steps.trufflehog.outcome == 'failure' 
          run: exit 1

  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout
        uses: actions/checkout@v6

      # 2. Set up Docker Buildx for efficient layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 3. Cache Docker layers between runs — speeds up builds significantly
      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # 4. Build the Docker image (validates your Dockerfile before deploying)
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false  # just build; Fly.io handles the actual push below
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Prevents cache from growing unboundedly over time
      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # 5. Install the Fly.io CLI
      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # 6. Deploy to Fly.io
      #    FLY_API_TOKEN must be added to your GitHub repo:
      #    Settings → Secrets and variables → Actions → New repository secret
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}