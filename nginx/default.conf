server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    server_tokens off;   # <-- ADDED: don't advertise Nginx version

    # React is a SPA — always serve index.html for unknown routes
    # (important if you add React Router later)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (Vite fingerprints filenames, so immutable is safe)
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    # <-- ADDED: force HTTPS on repeat visits
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # <-- ADDED: Content Security Policy (test against your fonts setup before deploy)
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://api.github.com; frame-ancestors 'none'; base-uri 'self'" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}